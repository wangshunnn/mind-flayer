name: Release

on:
    push:
        tags:
            - "v*.*.*"

concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

jobs:
    publish-macos:
        name: Publish macOS (${{ matrix.target }})
        runs-on: ${{ matrix.runner }}
        permissions:
            contents: write

        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-15
                      target: aarch64-apple-darwin
                    - runner: macos-15-intel
                      target: x86_64-apple-darwin

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"
                  cache: "pnpm"

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Cache Rust dependencies
              uses: Swatinem/rust-cache@v2
              with:
                  workspaces: src-tauri

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Prepare App Store Connect API key
              env:
                  APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_PRIVATE_KEY }}
                  APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
              run: |
                  mkdir -p "$RUNNER_TEMP/private_keys"
                  API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
                  printf '%s' "$APPLE_API_KEY_CONTENT" > "$API_KEY_PATH"
                  echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

            - name: Build sidecar
              env:
                  SIDECAR_TARGET_TRIPLE: ${{ matrix.target }}
              run: pnpm build:sidecar

            - name: Build and publish Tauri bundles
              uses: tauri-apps/tauri-action@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
                  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
                  APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
                  APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
                  APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
                  APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
                  APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
                  APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
                  SIDECAR_TARGET_TRIPLE: ${{ matrix.target }}
              with:
                  tagName: ${{ github.ref_name }}
                  releaseName: Mind Flayer v__VERSION__
                  generateReleaseNotes: true
                  releaseDraft: false
                  prerelease: false
                  tauriScript: pnpm tauri
                  uploadUpdaterJson: true
                  uploadUpdaterSignatures: true
                  args: --target ${{ matrix.target }}
